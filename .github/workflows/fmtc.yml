name: FMTC

on:
  push:
    branches:
      - master
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  pull_request:
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION)
        type: string
        required: false
  merge_group:

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: ubuntu-24.04-arm
            name: Linux ARM
          - os: windows-2025-vs2026
            name: Windows x64
          - os: macos-26
            name: macOS ARM64
          - os: macos-26-intel
            name: macOS x64

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive fmtc/fmtconv

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4
        with:
          package-dir: fmtc
          output-dir: wheelhouse
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fmtc-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive fmtc/fmtconv

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-fmtconv
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fmtconv-sdist
          path: dist/*.tar.gz

  upload-release:
    name: Upload to GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    permissions:
      contents: write
    uses: ./.github/workflows/upload-release.yml
    with:
      wheel-pattern: fmtc-wheels-*
      sdist-name: fmtconv-sdist
      display-name: vapoursynth-fmtconv

  update-index:
    name: Update package index
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [upload-release]
    uses: ./.github/workflows/update-index.yml
    permissions:
      contents: read
      pages: write
      id-token: write
