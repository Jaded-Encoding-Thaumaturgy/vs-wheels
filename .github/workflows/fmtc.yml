name: FMTC

on:
  push:
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  pull_request:
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION)
        type: string
        required: false

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: ubuntu-24.04-arm
            name: Linux ARM
          - os: windows-2025-vs2026
            name: Windows x64
          - os: macos-26
            name: macOS ARM64
          - os: macos-26-intel
            name: macOS x64

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4
        with:
          package-dir: fmtc
          output-dir: wheelhouse
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: fmtc-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-fmtconv
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: fmtconv-sdist
          path: dist/*.tar.gz

  upload-release:
    name: Upload to GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v7
        with:
          pattern: fmtc-wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v7
        with:
          name: fmtconv-sdist
          path: dist

      - name: Determine version
        id: version
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          VERSION=$(basename "$WHEEL" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="vapoursynth-fmtconv-v${{ steps.version.outputs.version }}"
          TITLE="vapoursynth-fmtconv ${{ steps.version.outputs.version }}"

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "vapoursynth-fmtconv ${{ steps.version.outputs.version }}" \
            --latest 2>/dev/null || true

          gh release upload "$TAG" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  update-index:
    name: Update package index
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [upload-release]
    uses: ./.github/workflows/update-index.yml
    permissions:
      contents: read
      pages: write
      id-token: write
