name: FMTC

on:
  push:
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  pull_request:
    paths:
      - fmtc/**
      - .github/workflows/fmtc.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION)
        type: string
        required: false

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: ubuntu-24.04-arm
            name: Linux ARM
          - os: windows-2025-vs2026
            name: Windows x64
          - os: macos-26
            name: macOS ARM64
          - os: macos-26-intel
            name: macOS x64

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4
        with:
          package-dir: fmtc
          output-dir: wheelhouse
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: fmtc-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-fmtconv
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: fmtconv-sdist
          path: dist/*.tar.gz

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run publish.yml
          -f artifact-pattern=fmtconv-*
          -f package=vapoursynth-fmtconv
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
