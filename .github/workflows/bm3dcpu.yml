name: BM3DCPU

on:
  push:
    paths:
      - bm3dcuda/bm3dcpu/**
      - .github/workflows/bm3dcpu.yml
  pull_request:
    paths:
      - bm3dcuda/bm3dcpu/**
      - .github/workflows/bm3dcpu.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup MSVC
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . ./scripts/Enter-DevShell.ps1
          $envVars = "INCLUDE", "LIB", "LIBPATH", "UCRTVersion", "VCToolsVersion", "WindowsSdkDir", "PATH"
          $envVars | ForEach-Object { if (Test-Path "Env:$_") { "$_=$((Get-Content Env:\$_))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 } }

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: bm3dcuda/bm3dcpu

      - uses: actions/upload-artifact@v7
        with:
          name: bm3dcpu-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-bm3dcpu

      - uses: actions/upload-artifact@v7
        with:
          name: bm3dcpu-sdist
          path: dist/*.tar.gz

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run publish.yml
          -f artifact-pattern=bm3dcpu-*
          -f package=vapoursynth-bm3dcpu
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
