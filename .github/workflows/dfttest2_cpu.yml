name: DFTTEST2_CPU

on:
  push:
    branches:
      - master
    paths:
      - dfttest2/dfttest2_cpu/**
      - .github/workflows/dfttest2_cpu.yml
  pull_request:
    paths:
      - dfttest2/dfttest2_cpu/**
      - .github/workflows/dfttest2_cpu.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CPU)
        type: string
        required: false
  merge_group:

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: windows-2025-vs2026
            name: Windows x64
          - os: macos-26-intel
            name: macOS x64

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive dfttest2/dfttest2_cpu/vs-dfttest2 dfttest2/dfttest2_cpu/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup MSVC
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . ./scripts/Enter-DevShell.ps1
          $envVars = "INCLUDE", "LIB", "LIBPATH", "UCRTVersion", "VCToolsVersion", "WindowsSdkDir", "PATH"
          $envVars | ForEach-Object { if (Test-Path "Env:$_") { "$_=$((Get-Content Env:\$_))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 } }

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: dfttest2/dfttest2_cpu
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CPU="${{ inputs.version }}"

      - uses: actions/upload-artifact@v7
        with:
          name: dfttest2_cpu-wheels-${{ matrix.name }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive dfttest2/dfttest2_cpu/vs-dfttest2 dfttest2/dfttest2_cpu/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-dfttest2_cpu
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CPU: ${{ inputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: dfttest2_cpu-sdist
          path: dist/*.tar.gz

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run publish.yml
          -f artifact-pattern=dfttest2_cpu-*
          -f package=vapoursynth-dfttest2_cpu
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
