name: BM3DCUDA

on:
  push:
    paths:
      - bm3dcuda/bm3dcuda/**
      - .github/workflows/bm3dcuda.yml
  pull_request:
    paths:
      - bm3dcuda/bm3dcuda/**
      - .github/workflows/bm3dcuda.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DCUDA)
        type: string
        required: false
      cuda-linux:
        description: CUDA version for Linux
        type: string
        required: false
        default: "12.8"
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "13.0.1"
env:
  CUDA_LINUX: ${{ inputs.cuda-linux || '12.8' }}
  CUDA_WINDOWS: ${{ inputs.cuda-windows || '13.0.1' }}

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            container: quay.io/pypa/manylinux_2_28_x86_64
            cuda_repo: rhel8/x86_64
          - os: ubuntu-24.04-arm
            arch: sbsa
            container: quay.io/pypa/manylinux_2_28_aarch64
            cuda_repo: rhel8/sbsa
          - os: windows-2025
            arch: amd64

    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Setup CUDA (Linux)
        if: runner.os == 'Linux'
        run: |
          CUDA_VER="${{ env.CUDA_LINUX }}"
          CUDA_DASH=${CUDA_VER//./-}
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/${{ matrix.cuda_repo }}/cuda-rhel8.repo
          dnf clean all
          dnf -y install \
            cuda-nvcc-$CUDA_DASH \
            cuda-cudart-devel-$CUDA_DASH \
            cuda-nvrtc-devel-$CUDA_DASH \
            cuda-driver-devel-$CUDA_DASH
          echo "CUDA_PATH=/usr/local/cuda" >> $GITHUB_ENV
          echo "/usr/local/cuda/bin" >> $GITHUB_PATH

      - name: Prepare CUDA stubs (Linux)
        if: runner.os == 'Linux'
        run: |
          STUB_DIRS=$(find /usr/local/cuda-${{ env.CUDA_LINUX }} -name stubs -type d)
          for dir in $STUB_DIRS; do
            ln -sf $dir/libcuda.so /usr/lib64/libcuda.so
            ln -sf $dir/libcuda.so /usr/lib64/libcuda.so.1
            echo "LD_LIBRARY_PATH=$dir${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> $GITHUB_ENV
            echo "LIBRARY_PATH=$dir${LIBRARY_PATH:+:${LIBRARY_PATH}}" >> $GITHUB_ENV
          done

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . ./scripts/Enter-DevShell.ps1
          $envVars = "INCLUDE", "LIB", "LIBPATH", "UCRTVersion", "VCToolsVersion", "WindowsSdkDir", "PATH"
          $envVars | ForEach-Object { if (Test-Path "Env:$_") { "$_=$((Get-Content Env:\$_))" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8 } }

      - name: Configure CUDA Path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cudaVersion = "${{ env.CUDA_WINDOWS }}"
          $cudaShort = $cudaVersion -replace '\.\d+$', ''
          "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$cudaShort" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUDA_VERSION_WINDOWS=$cudaVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUDA_VERSION_WINDOWS_SHORT=$cudaShort" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache CUDA (Windows)
        if: runner.os == 'Windows'
        id: cache-cuda
        uses: actions/cache@v5
        with:
          path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
          key: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.os }}-cuda-${{ env.CUDA_WINDOWS }}

      - name: Setup CUDA (Windows)
        if: runner.os == 'Windows' && steps.cache-cuda.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $cudaVersion = $env:CUDA_VERSION_WINDOWS
          $cudaShort = $env:CUDA_VERSION_WINDOWS_SHORT
          curl.exe -s -o cuda_installer.exe -L `
            "https://developer.download.nvidia.com/compute/cuda/$cudaVersion/network_installers/cuda_${cudaVersion}_windows_network.exe"
          Start-Process ./cuda_installer.exe -ArgumentList `
            "-s",
            "nvcc_$cudaShort",
            "cudart_$cudaShort",
            "nvrtc_dev_$cudaShort",
            "crt_$cudaShort",
            "nvptxcompiler_$cudaShort",
            "nvvm_$cudaShort" `
            -Wait

      - name: Build wheels
        run: uv build --wheel --package vapoursynth-bm3dcuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DCUDA: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: bm3dcuda-wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-bm3dcuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DCUDA: ${{ inputs.version }}

      - uses: actions/upload-artifact@v7
        with:
          name: bm3dcuda-sdist
          path: dist/*.tar.gz

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run publish.yml
          -f artifact-pattern=bm3dcuda-*
          -f package=vapoursynth-bm3dcuda
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
